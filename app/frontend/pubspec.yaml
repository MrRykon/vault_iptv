name: vault
description: A private Android media app for personal/family use.
publish_to: 'none'

version: 0.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.1
  video_player: ^2.7.2
  chewie: ^1.7.0
  provider: ^6.0.5
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_file: ^3.3.2
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  simple_pip_mode: ^1.1.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/dragon_logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/dragon_logo.png"
